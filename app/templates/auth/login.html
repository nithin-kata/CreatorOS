{% extends "base.html" %}

{% block title %}Sign In - CreatorOS{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel rounded-2xl p-8 shadow-xl space-y-6">
        <!-- Logo Header -->
        <div class="text-center space-y-2">
            <div class="w-11.5 h-11.5 rounded-2xl bg-brand-orange text-white text-2xl font-black inline-flex items-center justify-center shadow-lg shadow-brand-orange/20 select-none">C</div>
            <h1 class="text-2xl font-bold text-brand-textDark tracking-tight mt-3">Welcome Back</h1>
            <p class="text-sm text-brand-textMuted">Access your brand workspace</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-4">
            <div>
                <label for="email" class="block text-xs font-semibold text-brand-textMuted uppercase tracking-wider mb-1.5">Email Address</label>
                <input type="email" name="email" id="email" required placeholder="name@domain.com"
                       class="w-full px-4 py-3 rounded-xl border border-brand-border bg-white text-brand-textDark focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/15 transition-all text-sm">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label for="password" class="block text-xs font-semibold text-brand-textMuted uppercase tracking-wider">Password</label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-xs font-semibold text-brand-orange hover:text-brand-darkOrange transition-all">Forgot?</a>
                </div>
                <input type="password" name="password" id="password" required placeholder="••••••••"
                       class="w-full px-4 py-3 rounded-xl border border-brand-border bg-white text-brand-textDark focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/15 transition-all text-sm">
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" name="remember" class="w-4 h-4 rounded text-brand-orange border-brand-border focus:ring-brand-orange">
                <label for="remember" class="ml-2 text-xs font-medium text-brand-textMuted select-none">Remember this device</label>
            </div>

            <button type="submit" class="w-full btn-orange-primary py-3.5 rounded-xl font-bold text-sm tracking-wide mt-2">
                Sign In
            </button>
        </form>

        <div class="text-center pt-4 border-t border-brand-border/40">
            <p class="text-xs text-brand-textMuted">
                Don't have an account? 
                <a href="{{ url_for('auth.register') }}" class="font-semibold text-brand-orange hover:text-brand-darkOrange transition-all ml-0.5">Start Building</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
