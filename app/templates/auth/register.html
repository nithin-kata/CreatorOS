{% extends "base.html" %}

{% block title %}Start Building - CreatorOS{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel rounded-2xl p-8 shadow-xl space-y-6">
        <!-- Logo Header -->
        <div class="text-center space-y-2">
            <div class="w-11.5 h-11.5 rounded-2xl bg-brand-orange text-white text-2xl font-black inline-flex items-center justify-center shadow-lg shadow-brand-orange/20 select-none">C</div>
            <h1 class="text-2xl font-bold text-brand-textDark tracking-tight mt-3">Start Building</h1>
            <p class="text-sm text-brand-textMuted">Create your AI Brand Engine profile</p>
        </div>

        <form action="{{ url_for('auth.register') }}" method="POST" class="space-y-4">
            <div>
                <label for="name" class="block text-xs font-semibold text-brand-textMuted uppercase tracking-wider mb-1.5">Full Name</label>
                <input type="text" name="name" id="name" required placeholder="Alex Johnson"
                       class="w-full px-4 py-3 rounded-xl border border-brand-border bg-white text-brand-textDark focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/15 transition-all text-sm">
            </div>

            <div>
                <label for="email" class="block text-xs font-semibold text-brand-textMuted uppercase tracking-wider mb-1.5">Email Address</label>
                <input type="email" name="email" id="email" required placeholder="name@domain.com"
                       class="w-full px-4 py-3 rounded-xl border border-brand-border bg-white text-brand-textDark focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/15 transition-all text-sm">
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-brand-textMuted uppercase tracking-wider mb-1.5">Password</label>
                <input type="password" name="password" id="password" required placeholder="Min. 8 characters"
                       class="w-full px-4 py-3 rounded-xl border border-brand-border bg-white text-brand-textDark focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/15 transition-all text-sm">
            </div>

            <button type="submit" class="w-full btn-orange-primary py-3.5 rounded-xl font-bold text-sm tracking-wide mt-2">
                Create Account
            </button>
        </form>

        <div class="text-center pt-4 border-t border-brand-border/40">
            <p class="text-xs text-brand-textMuted">
                Already have an account? 
                <a href="{{ url_for('auth.login') }}" class="font-semibold text-brand-orange hover:text-brand-darkOrange transition-all ml-0.5">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
