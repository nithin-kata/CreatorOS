{% extends "base.html" %}

{% block title %}Reset Password - CreatorOS{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel rounded-2xl p-8 shadow-xl space-y-6 text-left">
        <!-- Logo Header -->
        <div class="text-center space-y-2">
            <div class="w-11.5 h-11.5 rounded-2xl bg-brand-orange text-white text-2xl font-black inline-flex items-center justify-center shadow-lg shadow-brand-orange/20 select-none">C</div>
            <h1 class="text-2xl font-bold text-brand-textDark tracking-tight mt-3">Create New Password</h1>
            <p class="text-sm text-brand-textMuted">Enter your new credentials below to restore access</p>
        </div>

        <form action="{{ url_for('auth.reset_password', token=token) }}" method="POST" class="space-y-4">
            <div>
                <label for="password" class="block text-xs font-semibold text-brand-textMuted uppercase tracking-wider mb-1.5">New Password</label>
                <div class="auth-input-wrapper">
                    <input type="password" name="password" id="password" required placeholder="Min. 8 characters"
                           class="w-full px-4 py-3 rounded-xl border border-brand-border bg-white text-brand-textDark focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/15 transition-all text-sm auth-input-styled">
                    <button type="button" class="auth-toggle-password" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">
                        <svg class="eye-icon w-4 h-4 text-brand-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
            </div>

            <div>
                <label for="confirm_password" class="block text-xs font-semibold text-brand-textMuted uppercase tracking-wider mb-1.5">Confirm Password</label>
                <div class="auth-input-wrapper">
                    <input type="password" name="confirm_password" id="confirm_password" required placeholder="••••••••"
                           class="w-full px-4 py-3 rounded-xl border border-brand-border bg-white text-brand-textDark focus:outline-none focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/15 transition-all text-sm auth-input-styled">
                    <button type="button" class="auth-toggle-password" onclick="togglePasswordVisibility('confirm_password', this)" aria-label="Toggle password visibility">
                        <svg class="eye-icon w-4 h-4 text-brand-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full btn-orange-primary py-3.5 rounded-xl font-bold text-sm tracking-wide mt-4">
                Update Password
            </button>
        </form>
    </div>
</div>

<style>
.auth-input-wrapper {
    position: relative;
    width: 100%;
}
.auth-input-styled {
    padding-right: 44px !important;
}
.auth-toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    padding: 6px;
    cursor: pointer;
    color: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s ease;
}
.auth-toggle-password:hover {
    color: #333;
}
</style>

<script>
function togglePasswordVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    if (!input) return;
    if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = `<svg class="eye-icon w-4 h-4 text-brand-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18"/></svg>`;
    } else {
        input.type = 'password';
        btn.innerHTML = `<svg class="eye-icon w-4 h-4 text-brand-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`;
    }
}
</script>
{% endblock %}
